[env:Thor67_ESP_RX_Backpack_via_UART]
extends = env_common_esp8285, thor67_vrx_backpack_common
build_flags =
	${env_common_esp8285.build_flags}
	${thor67_vrx_backpack_common.build_flags}
	-D PIN_LED=16
	-D PIN_MOSI=3	;RX pad
	-D PIN_CLK=0 	;Boot pad
	-D PIN_CS=1		;TX pad

[env:Thor67_ESP_RX_Backpack_via_WIFI]
extends = env:Thor67_ESP_RX_Backpack_via_UART
